version: "3.9"

services:

  db:
    image: postgres:15
    container_name: workout_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workout_db
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: workout_api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/workout_db
    ports:
      - "8000:8000"